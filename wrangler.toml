# Cloudflare Pages configuration
# See: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "adamfortuna-com"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "./dist"

# Environment variables (set these in Cloudflare dashboard or via wrangler secret)
# Required:
# - WP_ADAMFORTUNA_TOKEN
# - WP_HARDCOVER_TOKEN
# - WP_MINAFI_TOKEN
# - WORDPRESS_WEBHOOK_SECRET
# - CLOUDFLARE_ZONE_ID (for cache purging)
# - CLOUDFLARE_API_TOKEN (for cache purging)

# KV namespace for edge + GraphQL response caching.
# Reads/writes are wrapped by src/lib/kvCache.ts and src/lib/cacheVersion.ts.
[[kv_namespaces]]
binding = "CACHE"
id = "66917697ced04bc4b450f8daaf208bbe"

# For local development
[dev]
port = 4321