# Cloudflare Pages configuration
# See: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "adamfortuna-com"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "./dist"

# Environment variables (set these in Cloudflare dashboard or via wrangler secret)
# Required:
# - WP_ADAMFORTUNA_TOKEN
# - WP_HARDCOVER_TOKEN
# - WP_MINAFI_TOKEN
# - WORDPRESS_WEBHOOK_SECRET
# - CLOUDFLARE_ZONE_ID (for cache purging)
# - CLOUDFLARE_API_TOKEN (for cache purging)

# KV namespace for caching GraphQL responses
# Create with: npx wrangler kv namespace create GRAPHQL_CACHE
# Then replace the id below with the one from the output
[[kv_namespaces]]
binding = "GRAPHQL_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# For local development
[dev]
port = 4321